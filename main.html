<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Gorgon Brewing Recipes</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: 30px auto;
    padding: 0 20px;
    background: #fafafa;
}

h1 {
    margin-bottom: 5px;
}

.status {
    color: #666;
    margin-bottom: 20px;
}

.controls {
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

input {
    padding:8px;
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th {
    background:#333;
    color:white;
}

td, th {
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f5f5f5;
}

</style>

</head>

<body>


<h1>Project Gorgon Brewing Recipes</h1>

<div class="status" id="status">
Loading game data...
</div>


<div class="controls">

<label>
Recipe CSV:
<input type="file" id="csvFile" accept=".csv">
</label>

<input
type="search"
id="search"
placeholder="Search effect..."
>

</div>


<table>

<thead>
<tr>
<th>Drink</th>
<th>Suffix</th>
<th>Effect</th>
</tr>
</thead>

<tbody id="results">
</tbody>

</table>



<script>


let powers = {};
let recipes = [];



//
// Load Project Gorgon data
//

async function loadGameData(){

    try {

        const client =
            await fetch("tsysclientinfo.json")
            .then(r => r.json());


        for(const item of Object.values(client)){

            if(item.InternalName){

                powers[item.InternalName] = item;

            }

        }


        document.getElementById("status")
        .innerText =
        "Loaded " +
        Object.keys(powers).length +
        " effects";


    }
    catch(e){

        document.getElementById("status")
        .innerText =
        "Failed loading game data";

        console.error(e);

    }

}



//
// Convert {MAX_ARMOR}{64}
// into
// Max Armor +64
//

function formatEffect(text){


    const parts =
    [...text.matchAll(/\{([^}]+)\}/g)]
    .map(x=>x[1]);


    if(parts.length < 2)
        return text;


    let stat =
    parts[0]
    .replaceAll("_"," ")
    .toLowerCase()
    .replace(/\b\w/g,
        c=>c.toUpperCase()
    );


    return stat + " +" + parts[1];

}




//
// Resolve effect ID + tier
//

function resolveEffect(id,tier){


    const power =
        powers[id];


    if(!power){

        return {
            suffix:"",
            effect:id
        };

    }


    const tierData =
        power.Tiers?.["id_"+tier];


    if(!tierData){

        return {
            suffix:power.Suffix || "",
            effect:id
        };

    }


    return {

        suffix:
            power.Suffix || "",


        effect:
            tierData.EffectDescs
            .map(formatEffect)
            .join(", ")

    };


}





//
// CSV parser
//

function parseCSV(text){


    recipes=[];


    for(const line of text.split(/\r?\n/)){


        if(!line.trim())
            continue;


        const c=line.split(",");


        if(c.length < 8)
            continue;



        const drink =
            c[0]
            .replace("(Bottle)","")
            .trim();



        const effectId =
            c[6];


        const tier =
            c[7];



        const result =
            resolveEffect(
                effectId,
                tier
            );



        recipes.push({

            drink,

            suffix:
                result.suffix,


            effect:
                result.effect

        });


    }


    render();

}




//
// Display table
//

function render(){


    const tbody =
        document.getElementById("results");


    tbody.innerHTML="";


    const search =
        document
        .getElementById("search")
        .value
        .toLowerCase();



    const seen =
        new Set();



    for(const r of recipes){


        const key =
            r.drink +
            r.effect;


        if(seen.has(key))
            continue;


        seen.add(key);



        const text =
            (
            r.drink+
            r.suffix+
            r.effect
            )
            .toLowerCase();


        if(!text.includes(search))
            continue;



        const row =
            document.createElement("tr");


        row.innerHTML = `

        <td>${r.drink}</td>

        <td>${r.suffix}</td>

        <td>${r.effect}</td>

        `;


        tbody.appendChild(row);


    }


}





document
.getElementById("csvFile")
.addEventListener(
"change",
async e=>{


    const file =
        e.target.files[0];


    const text =
        await file.text();


    parseCSV(text);


});



document
.getElementById("search")
.addEventListener(
"input",
render
);



loadGameData();


</script>


</body>
</html>
